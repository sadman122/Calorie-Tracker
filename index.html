<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calorie Tracker</title>
</head>
<body>

    <h1>Calorie Tracker</h1>

    <div class="calorie-target-section">

        <input type="text" class="calorie-target-input" placeholder="Enter Calorie Target">
        <button class="set-calorie-target-button">Set Target</button>
    </div>


    <div class="food-entry-section">
        <h3>Breakfast</h3>

        <div class="breakfast">
            <input type="text" class="breakfast-item-input" placeholder="Food Item">
            <input type="text" class="breakfast-item-calories-input" placeholder="Calories">
            <button class="breakfast-add-button">Add</button>
        </div>


        <h3>Lunch</h3>

        <div class="lunch">
            <input type="text" class="lunch-item-input" placeholder="Lunch Item">
            <input type="text" class="lunch-item-calories-input" placeholder="Calories">
            <button class="lunch-add-button">Add</button>

        </div>

        <h3>Dinner</h3>

        <div class="dinner">
            <input type="text" class="dinner-item-input" placeholder="Dinner Item">
            <input type="text" class="dinner-item-calories-input" placeholder="Calories">
            <button class="dinner-add-button">Add</button>

        </div>
    </div>

    <div class="show-total-button">
        <button>Show Total Calories</button>
    </div>

    <div class="total-calorie-display-section">

    </div>

    <div class="show-foods-section">
        <button class="show-food-button">Show Foods</button>

        <div class="show-foods">

        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
